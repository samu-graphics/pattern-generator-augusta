<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generatore di Pattern</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; }

    #setup-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 2rem;
    }
    #setup-screen h1 { font-size: 1.75rem; margin-bottom: 2rem; font-weight: 500; letter-spacing: -0.02em; }
    .setup-form {
      display: flex; flex-direction: column; gap: 1.25rem; align-items: center;
      background: white; padding: 2rem 2.5rem; border: 1px solid #e0e0e0;
    }
    .setup-dimensions { display: flex; gap: 1rem; align-items: end; }
    .setup-dimensions label {
      display: flex; flex-direction: column; gap: 0.35rem; font-size: 0.8rem; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .setup-dimensions input {
      width: 120px; padding: 0.5rem; border: 1px solid #d0d0d0; font-size: 1rem;
      font-family: inherit; outline: none;
    }
    .setup-dimensions input:focus { border-color: #1a1a1a; }
    .setup-presets { display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; }
    .setup-presets button {
      padding: 0.4rem 1rem; border: 1px solid #d0d0d0; background: white;
      cursor: pointer; font-size: 0.8rem; transition: border-color 0.15s; font-family: inherit;
    }
    .setup-presets button:hover { border-color: #1a1a1a; }
    #btn-generate {
      padding: 0.7rem 2.5rem; background: #1a1a1a; color: white; border: none;
      font-size: 0.9rem; cursor: pointer; transition: background 0.15s;
      font-family: inherit; letter-spacing: 0.03em;
    }
    #btn-generate:hover { background: #333; }

    #app { display: none; min-height: 100vh; position: relative; }
    #canvas-container {
      position: relative; width: 100%; min-height: 100vh;
      overflow: auto; padding: 2rem; display: flex; justify-content: center;
      background: #e8e8e8;
    }
    #sheet {
      position: relative; background: white; border: 1px solid #d8d8d8;
      overflow: hidden; margin: auto;
    }

    #sidebar {
      position: fixed; top: 0; right: -380px; width: 360px; height: 100vh;
      background: white; border-left: 1px solid #e0e0e0;
      transition: right 0.25s ease; z-index: 999999; display: flex; flex-direction: column;
    }
    #sidebar.open { right: 0; }
    #sidebar-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.25rem; border-bottom: 1px solid #e8e8e8;
    }
    #sidebar-header h2 { font-size: 0.85rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #999; }
    #sidebar-content { flex: 1; overflow-y: auto; padding: 1.25rem; }
    #sidebar-close, #sidebar-toggle {
      background: none; border: none; cursor: pointer; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center; color: #999;
    }
    #sidebar-close:hover, #sidebar-toggle:hover { color: #1a1a1a; }
    #sidebar-toggle {
      position: fixed; top: 1rem; right: 1rem; z-index: 999998; background: white;
      border: 1px solid #d0d0d0; width: 36px; height: 36px;
    }
    #sidebar.open ~ #sidebar-toggle { display: none; }

    #zoom-bar {
      position: fixed; bottom: 1rem; right: 1rem; z-index: 999997;
      background: white; border: 1px solid #d0d0d0;
      display: flex; align-items: center; padding: 0.15rem;
    }
    #zoom-bar button {
      background: none; border: none; padding: 0.35rem 0.5rem;
      cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center;
    }
    #zoom-bar button:hover { color: #1a1a1a; }
    #zoom-bar .zoom-pct {
      min-width: 2.8rem; text-align: center; font-size: 0.75rem; color: #999; font-weight: 500;
    }

    @media print {
      #sidebar, #sidebar-toggle, #zoom-bar { display: none !important; }
      #canvas-container { padding: 0; min-height: auto; background: white; overflow: visible; }
      #sheet { border: none; }
    }

    .control-group { margin-bottom: 1rem; }
    .control-group label {
      display: block; font-size: 0.75rem; font-weight: 500; margin-bottom: 0.3rem;
      color: #888; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .control-group input[type="range"] {
      width: 100%; height: 20px; margin: 0;
      -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer;
    }
    .control-group input[type="range"]::-webkit-slider-runnable-track {
      height: 2px; background: #d5d5d5; border: none; border-radius: 0;
    }
    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #1a1a1a; margin-top: -6px; cursor: pointer;
    }
    .control-group input[type="range"]:focus { outline: none; }
    .control-group input[type="range"]:focus::-webkit-slider-runnable-track { background: #bbb; }
    .range-labels { display: flex; justify-content: space-between; font-size: 0.7rem; color: #bbb; margin-top: 0.15rem; }

    .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.6rem; }
    .checkbox-group label {
      font-weight: 400; font-size: 0.82rem; display: flex; align-items: center; gap: 0.4rem; cursor: pointer; color: #444;
    }
    .checkbox-group input[type="checkbox"] {
      -webkit-appearance: none; appearance: none; width: 16px; height: 16px;
      border: 1.5px solid #ccc; margin: 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .checkbox-group input[type="checkbox"]:checked { border-color: #1a1a1a; background: #1a1a1a; }
    .checkbox-group input[type="checkbox"]:checked::after {
      content: ''; width: 5px; height: 9px; border: solid white;
      border-width: 0 1.5px 1.5px 0; transform: rotate(45deg); margin-top: -2px;
    }

    .seed-row { display: flex; gap: 0.5rem; }
    .seed-row input {
      flex: 1; padding: 0.4rem 0.5rem; border: 1px solid #d0d0d0;
      font-size: 0.82rem; font-family: inherit; outline: none;
    }
    .seed-row input:focus { border-color: #1a1a1a; }
    .seed-row button {
      padding: 0.4rem 0.7rem; font-size: 0.8rem; border: 1px solid #d0d0d0; background: white;
      cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 0.3rem; color: #555;
    }
    .seed-row button:hover { border-color: #1a1a1a; color: #1a1a1a; }

    .margins-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.4rem; }
    .margins-grid div { display: flex; align-items: center; gap: 0.3rem; }
    .margins-grid label {
      font-weight: 400; font-size: 0.7rem; color: #bbb; margin: 0; min-width: 1rem; text-transform: uppercase;
    }
    .margins-grid input {
      width: 100%; padding: 0.35rem; border: 1px solid #d0d0d0;
      font-size: 0.82rem; font-family: inherit; outline: none;
    }
    .margins-grid input:focus { border-color: #1a1a1a; }

    hr { border: none; border-top: 1px solid #e8e8e8; margin: 1rem 0; }

    .btn-primary {
      width: 100%; padding: 0.65rem; border: none; font-size: 0.85rem; cursor: pointer;
      margin-bottom: 0.5rem; background: #1a1a1a; color: white; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 0.4rem;
    }
    .btn-primary:hover { background: #333; }
    .btn-export {
      flex: 1; padding: 0.5rem; border: 1px solid #d0d0d0;
      background: white; color: #666; font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; text-align: center; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 0.3rem;
    }
    .btn-export:hover { border-color: #1a1a1a; color: #1a1a1a; }
    .btn-export.done { border-color: #4a4; color: #4a4; }

    input[type="color"] {
      width: 100%; height: 32px; padding: 2px; border: 1px solid #d0d0d0; cursor: pointer; background: none;
    }
    input[type="color"]:hover { border-color: #1a1a1a; }
  </style>
</head>
<body>
  <div id="setup-screen">
    <h1>Generatore di Pattern</h1>
    <div class="setup-form">
      <div class="setup-dimensions">
        <label>
          Larghezza
          <input type="number" id="sheet-width" value="210" min="10">
        </label>
        <label>
          Altezza
          <input type="number" id="sheet-height" value="297" min="10">
        </label>
        <span style="font-size: 0.85rem; color: #555; padding-bottom: 0.5rem;">mm</span>
      </div>
      <div class="setup-presets">
        <button data-dimensions="210x297">A4</button>
        <button data-dimensions="297x420">A3</button>
        <button data-dimensions="500x500">Quadrato (500×500)</button>
        <button data-dimensions="800x800">Quadrato (800×800)</button>
      </div>
      <button id="btn-generate">Genera</button>
    </div>
  </div>

  <div id="app">
    <div id="canvas-container">
      <div id="sheet"></div>
    </div>
    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Impostazioni</h2>
        <button id="sidebar-close"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M13 5 5 13"/><path d="M5 5 13 13"/></svg></button>
      </div>
      <div id="sidebar-content">
        <div class="control-group">
          <label>Densità <span id="val-density">50</span></label>
          <input type="range" id="slider-density" min="1" max="100" value="50">
        </div>
        <div class="control-group">
          <label>Spaziatura <span id="val-gutter">0</span>%</label>
          <input type="range" id="slider-gutter" min="0" max="50" value="0">
          <div class="range-labels"><span>Nessuna</span><span>Massima</span></div>
        </div>
        <div class="control-group">
          <label>Scala <span id="val-scale">150</span>%</label>
          <input type="range" id="slider-scale" min="50" max="150" value="150">
          <div class="range-labels"><span>50%</span><span>150%</span></div>
        </div>
        <div class="control-group">
          <label>Rotazione <span id="val-rotation">0</span>°</label>
          <input type="range" id="slider-rotation" min="0" max="360" value="0">
        </div>
        <div class="control-group">
          <label>Variazione posizione <span id="val-position">0</span>%</label>
          <input type="range" id="slider-position" min="0" max="100" value="0">
        </div>
        <div class="control-group">
          <label>Dimensione stesso gruppo <span id="val-size-same">100</span>%</label>
          <input type="range" id="slider-size-same" min="0" max="100" value="100">
        </div>
        <div class="control-group">
          <label>Dimensione gruppi diversi <span id="val-size-diff">0</span>%</label>
          <input type="range" id="slider-size-diff" min="0" max="100" value="0">
        </div>
        <div class="control-group">
          <label>Raggruppabilità <span id="val-grouping">0</span></label>
          <input type="range" id="slider-grouping" min="0" max="100" value="0">
          <div class="range-labels"><span>Compatto</span><span>Mescolato</span></div>
        </div>
        <hr>
        <div class="control-group">
          <label>Colore riempimento</label>
          <input type="color" id="color-fill" value="#010101">
          <label style="margin-top:0.5rem">Colore sfondo</label>
          <input type="color" id="color-bg" value="#ffffff">
        </div>
        <div class="control-group">
          <label>Pattern attivi</label>
          <div class="checkbox-group">
            <label><input type="checkbox" id="chk-a" checked> Pattern A</label>
            <label><input type="checkbox" id="chk-b" checked> Pattern B</label>
            <label><input type="checkbox" id="chk-c" checked> Pattern C</label>
            <label><input type="checkbox" id="chk-d" checked> Pattern D</label>
          </div>
        </div>
        <hr>
        <div class="control-group">
          <label>Seed</label>
          <div class="seed-row">
            <input type="number" id="input-seed" value="42" min="0">
            <button id="btn-new-seed"><svg viewBox="0 0 18 18" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="12" height="12"/><circle cx="7" cy="7" r=".7" fill="currentColor"/><circle cx="11" cy="11" r=".7" fill="currentColor"/></svg>Nuovo seed</button>
          </div>
        </div>
        <div class="control-group">
          <label>Formato foglio (mm)</label>
          <div style="display:flex;gap:0.4rem;">
            <input type="number" id="sidebar-sheet-w" value="210" min="10" style="flex:1;">
            <span style="line-height:2rem;">×</span>
            <input type="number" id="sidebar-sheet-h" value="297" min="10" style="flex:1;">
          </div>
        </div>
        <div class="control-group">
          <label>Margini (mm)</label>
          <div class="margins-grid">
            <div><label>T</label><input type="number" id="margin-top" value="10" min="0"></div>
            <div><label>D</label><input type="number" id="margin-right" value="10" min="0"></div>
            <div><label>B</label><input type="number" id="margin-bottom" value="10" min="0"></div>
            <div><label>S</label><input type="number" id="margin-left" value="10" min="0"></div>
          </div>
        </div>
        <hr>
        <button id="btn-regenerate" class="btn-primary"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 9a6 6 0 1 1-2.5-4.9"/><path d="M16 3v4h-4"/></svg>Rigenera</button>
        <div class="control-group" style="margin-bottom:0">
          <label style="margin-bottom:0.5rem">Esporta</label>
          <div style="display:flex;gap:0.4rem;">
            <button id="btn-export-svg" class="btn-export" data-export="svg"><svg viewBox="0 0 18 18" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3"/><path d="m9 11 4-4"/><path d="M9 11 5 7"/><path d="M9 11V3"/></svg>SVG</button>
            <button id="btn-export-png" class="btn-export" data-export="png"><svg viewBox="0 0 18 18" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3"/><path d="m9 11 4-4"/><path d="M9 11 5 7"/><path d="M9 11V3"/></svg>PNG</button>
            <button id="btn-export-pdf" class="btn-export" data-export="pdf"><svg viewBox="0 0 18 18" width="12" height="12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12v3a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2v-3"/><path d="m9 11 4-4"/><path d="M9 11 5 7"/><path d="M9 11V3"/></svg>PDF</button>
          </div>
          <div id="export-status" style="font-size:0.75rem;color:#888;margin-top:0.35rem;text-align:center;min-height:1em;"></div>
        </div>
      </div>
    </div>
    <button id="sidebar-toggle"><svg viewBox="0 0 18 18" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3 4.5h12"/><path d="M3 9h12"/><path d="M3 13.5h12"/></svg></button>

    <div id="zoom-bar">
      <button id="zoom-out" title="Zoom indietro"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M3.5 9h11"/></svg></button>
      <span class="zoom-pct" id="zoom-pct">100%</span>
      <button id="zoom-in" title="Zoom avanti"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M9 3.5v11"/><path d="M3.5 9h11"/></svg></button>
      <button id="zoom-fit" title="Adatta alla pagina"><svg viewBox="0 0 18 18" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 6V3h3M16 6V3h-3M2 12v3h3M16 12v3h-3"/></svg></button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.setup-presets button').forEach(btn => {
      btn.addEventListener('click', () => {
        const [w, h] = btn.dataset.dimensions.split('x').map(Number);
        document.getElementById('sheet-width').value = w;
        document.getElementById('sheet-height').value = h;
      });
    });

    document.getElementById('btn-generate').addEventListener('click', () => {
      const w = parseInt(document.getElementById('sheet-width').value, 10);
      const h = parseInt(document.getElementById('sheet-height').value, 10);
      if (!w || !h || w < 10 || h < 10) return alert('Inserisci dimensioni valide (min 10mm)');
      window.CONFIG = window.CONFIG || {};
      window.CONFIG.sheetW = w;
      window.CONFIG.sheetH = h;
      document.getElementById('setup-screen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      if (typeof initCanvas === 'function') initCanvas();
    });

    function applySheetSize(w, h) {
      window.CONFIG.sheetW = w;
      window.CONFIG.sheetH = h;
      document.getElementById('sidebar-sheet-w').value = w;
      document.getElementById('sidebar-sheet-h').value = h;
      const sheet = document.getElementById('sheet');
      sheet.style.width = (w * MM_TO_PX) + 'px';
      sheet.style.height = (h * MM_TO_PX) + 'px';
      sheet.style.transform = 'none';
      zoom = 1;
      generateComposition();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          zoomFit();
        });
      });
    }

    function initCanvas() {
      applySheetSize(window.CONFIG.sheetW, window.CONFIG.sheetH);
    }

    function getVal(id, fallback) {
      const el = document.getElementById(id);
      return el ? el.value : fallback;
    }

    function getConfig() {
      return {
        density: Math.max(1, parseInt(getVal('slider-density', 50), 10)),
        scale: parseInt(getVal('slider-scale', 150), 10) / 100,
        rotation: parseInt(getVal('slider-rotation', 0), 10),
        positionVariation: parseInt(getVal('slider-position', 0), 10) / 100,
        sizeSame: parseInt(getVal('slider-size-same', 100), 10) / 100,
        sizeDiff: parseInt(getVal('slider-size-diff', 0), 10) / 100,
        gutter: parseInt(getVal('slider-gutter', 0), 10) / 100,
        grouping: parseInt(getVal('slider-grouping', 0), 10) / 100,
        seed: parseInt(getVal('input-seed', 42), 10),
        activePatterns: ['a','b','c','d'].filter(p => {
          const el = document.getElementById('chk-' + p);
          return el && el.checked;
        }),
        color: getVal('color-fill', '#010101'),
        bgColor: getVal('color-bg', '#ffffff'),
        marginTop: parseInt(getVal('margin-top', 10), 10),
        marginRight: parseInt(getVal('margin-right', 10), 10),
        marginBottom: parseInt(getVal('margin-bottom', 10), 10),
        marginLeft: parseInt(getVal('margin-left', 10), 10),
      };
    }

    function generateComposition() {
      const config = getConfig();
      if (config.activePatterns.length === 0) {
        const sheet = document.getElementById('sheet');
        sheet.querySelectorAll('.pattern-instance').forEach(el => el.remove());
        let msg = document.getElementById('placeholder-msg');
        if (!msg) {
          msg = document.createElement('div');
          msg.id = 'placeholder-msg';
          msg.style.cssText = 'padding: 2rem; text-align: center; color: #999; font-style: italic;';
          sheet.appendChild(msg);
        }
        msg.textContent = 'Seleziona almeno un pattern';
        return;
      }

      const rng = mulberry32(config.seed);
      const sheet = document.getElementById('sheet');
      sheet.style.background = config.bgColor;

      const wPx = window.CONFIG.sheetW * MM_TO_PX;
      const hPx = window.CONFIG.sheetH * MM_TO_PX;
      const marginTop = config.marginTop * MM_TO_PX;
      const marginRight = config.marginRight * MM_TO_PX;
      const marginBottom = config.marginBottom * MM_TO_PX;
      const marginLeft = config.marginLeft * MM_TO_PX;
      const usableW = wPx - marginLeft - marginRight;
      const usableH = hPx - marginTop - marginBottom;

      const densityFactor = config.density / 50;
      const cellSize = Math.max(20, 50 / densityFactor);
      const cols = Math.max(1, Math.floor(usableW / cellSize));
      const rows = Math.max(1, Math.floor(usableH / cellSize));

      const placements = [];
      const typeScales = {};
      config.activePatterns.forEach(t => {
        typeScales[t] = 1 + (rng() * 2 - 1) * config.sizeDiff * 0.3;
      });

      const gutterPad = cellSize * config.gutter / 2;
      const effectiveCell = cellSize * (1 - config.gutter);
      const baseScale = cellSize * 0.6 * config.scale;
      const maxScale = effectiveCell * 0.9 * (config.scale > 1 ? config.scale : 1);

      function clampPos(center, half, cellOrigin) {
        const lo = cellOrigin + gutterPad + half;
        const hi = cellOrigin + cellSize - gutterPad - half;
        return lo < hi ? Math.max(lo, Math.min(hi, center)) : cellOrigin + cellSize / 2;
      }

      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const typeIndex = Math.floor(rng() * config.activePatterns.length);
          const type = config.activePatterns[typeIndex];

          let x = marginLeft + col * cellSize + cellSize / 2;
          let y = marginTop + row * cellSize + cellSize / 2;

          const maxOffset = cellSize * 0.4 * config.positionVariation;
          x += (rng() * 2 - 1) * maxOffset;
          y += (rng() * 2 - 1) * maxOffset;

          const intraVar = 1 + (rng() * 2 - 1) * (1 - config.sizeSame) * 0.5;
          const scale = Math.min(baseScale * typeScales[type] * intraVar, maxScale);
          const halfScale = scale / 2;
          const cellLeft = marginLeft + col * cellSize;
          const cellTop = marginTop + row * cellSize;
          x = clampPos(x, halfScale, cellLeft);
          y = clampPos(y, halfScale, cellTop);

          const rotation = (rng() * 2 - 1) * config.rotation;

          placements.push({ type, x, y, scale, rotation, row, col, zIndex: rng() });
        }
      }

      applyGrouping(placements, config.grouping, config.activePatterns, rng, cols, rows);

      placements.forEach(p => {
        const intraVar = 1 + (rng() * 2 - 1) * (1 - config.sizeSame) * 0.5;
        p.scale = Math.min(baseScale * (typeScales[p.type] || 1) * intraVar, maxScale);
        const halfScale = p.scale / 2;
        const cellLeft = marginLeft + p.col * cellSize;
        const cellTop = marginTop + p.row * cellSize;
        p.x = clampPos(p.x, halfScale, cellLeft);
        p.y = clampPos(p.y, halfScale, cellTop);
      });

      renderPatterns(sheet, placements, config.color);
    }

    function applyGrouping(placements, grouping, activePatterns, rng, cols, rows) {
      if (activePatterns.length <= 1) return;

      const numTypes = activePatterns.length;

      if (grouping <= 0.5) {
        const strength = grouping < 0.5 ? 1 - grouping * 2 : 0;
        const blockSize = Math.max(1, Math.ceil(1 + strength * 4));

        const blockTypes = {};
        placements.forEach(p => {
          const bx = Math.floor(p.col / blockSize);
          const by = Math.floor(p.row / blockSize);
          const key = bx + ',' + by;
          if (!blockTypes[key]) {
            blockTypes[key] = activePatterns[Math.floor(rng() * numTypes)];
          }
        });

        placements.forEach(p => {
          const bx = Math.floor(p.col / blockSize);
          const by = Math.floor(p.row / blockSize);
          if (rng() < strength) {
            p.type = blockTypes[bx + ',' + by];
          } else {
            p.type = activePatterns[Math.floor(rng() * numTypes)];
          }
        });
      } else {
        const strength = (grouping - 0.5) * 2;
        if (numTypes >= 2) {
          const posMap = {};
          placements.forEach((p, i) => { posMap[p.row * cols + p.col] = i; });

          for (let row = 0; row < rows; row++) {
            for (let col = 0; col < cols; col++) {
              const idx = posMap[row * cols + col];
              if (idx === undefined) continue;
              const p = placements[idx];
              const used = new Set();
              const li = posMap[row * cols + (col - 1)];
              if (li !== undefined) used.add(placements[li].type);
              const ti = posMap[(row - 1) * cols + col];
              if (ti !== undefined) used.add(placements[ti].type);
              if (rng() < strength && used.size < numTypes) {
                const available = activePatterns.filter(t => !used.has(t));
                p.type = available[Math.floor(rng() * available.length)];
              } else {
                p.type = activePatterns[Math.floor(rng() * numTypes)];
              }
            }
          }
        }
      }
    }

    const PARSED_SVGS = {};
    function getParsedSVG(type) {
      if (!PARSED_SVGS[type]) {
        const parser = new DOMParser();
        const doc = parser.parseFromString(PATTERN_SVGS[type], 'image/svg+xml');
        const svg = doc.documentElement;
        svg.removeAttribute('width');
        svg.removeAttribute('height');
        svg.style.width = '100%';
        svg.style.height = '100%';
        PARSED_SVGS[type] = svg;
      }
      return PARSED_SVGS[type].cloneNode(true);
    }

    function renderPatterns(sheet, placements, color) {
      sheet.querySelectorAll('.pattern-instance').forEach(el => el.remove());
      let msg = document.getElementById('placeholder-msg');
      if (msg) msg.remove();

      const fragment = document.createDocumentFragment();
      placements.forEach(p => {
        const svgEl = getParsedSVG(p.type);
        if (!svgEl) return;
        svgEl.querySelectorAll('path, rect, circle, polygon, polyline').forEach(el => {
          el.style.fill = color;
        });

        const wrapper = document.createElement('div');
        wrapper.className = 'pattern-instance';
        wrapper.style.position = 'absolute';
        wrapper.style.left = (p.x - p.scale / 2) + 'px';
        wrapper.style.top = (p.y - p.scale / 2) + 'px';
        wrapper.style.width = p.scale + 'px';
        wrapper.style.height = p.scale + 'px';
        wrapper.style.transform = `rotate(${p.rotation}deg)`;
        wrapper.style.transformOrigin = 'center center';
        wrapper.style.zIndex = Math.floor(p.zIndex * 10000);

        wrapper.appendChild(svgEl);
        fragment.appendChild(wrapper);
      });
      sheet.appendChild(fragment);
    }

    function getSVGString() {
      const sheet = document.getElementById('sheet');
      const w = sheet.offsetWidth;
      const h = sheet.offsetHeight;

      const bg = sheet.style.background || '#ffffff';
      const parts = [];
      parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`);
      parts.push(`<rect width="100%" height="100%" fill="${bg}"/>`);

      sheet.querySelectorAll('.pattern-instance').forEach(el => {
        const svg = el.querySelector('svg');
        if (!svg) return;
        const left = parseFloat(el.style.left);
        const top = parseFloat(el.style.top);
        const wi = parseFloat(el.style.width);
        const he = parseFloat(el.style.height);
        const match = el.style.transform ? el.style.transform.match(/rotate\(([\d.-]+)deg\)/) : null;
        const angle = parseFloat(match ? match[1] : 0);
        const vb = svg.getAttribute('viewBox') || '0 0 141.732 141.732';
        let inner = svg.innerHTML.replace(/<style>[\s\S]*?<\/style>/g, '');
        const cx = left + wi / 2;
        const cy = top + he / 2;
        parts.push(`<g transform="translate(${cx},${cy}) rotate(${angle}) translate(${-wi/2},${-he/2})">`);
        parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${wi}" height="${he}" viewBox="${vb}">`);
        parts.push(inner);
        parts.push('</svg></g>');
      });

      parts.push('</svg>');
      return parts.join('\n');
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function exportSVG() {
      downloadBlob(new Blob([getSVGString()], { type: 'image/svg+xml' }), 'pattern.svg');
    }

    function exportPNG() {
      const svgData = getSVGString();
      const parser = new DOMParser();
      const svgDoc = parser.parseFromString(svgData, 'image/svg+xml');
      const svgRoot = svgDoc.documentElement;
      const w = parseFloat(svgRoot.getAttribute('width'));
      const h = parseFloat(svgRoot.getAttribute('height'));

      const sheet = document.getElementById('sheet');
      const bg = sheet.style.background || '#ffffff';
      const canvas = document.createElement('canvas');
      canvas.width = w * 2;
      canvas.height = h * 2;
      const ctx = canvas.getContext('2d');
      ctx.scale(2, 2);
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      const blob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        canvas.toBlob(b => downloadBlob(b, 'pattern.png'));
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        document.getElementById('export-status').textContent = 'Errore PNG, prova SVG';
      };
      img.src = url;
    }

    let zoom = 1;
    const ZOOM_MIN = 0.1, ZOOM_MAX = 5, ZOOM_STEP = 0.1;

    function applyZoom() {
      const sheet = document.getElementById('sheet');
      const pct = document.getElementById('zoom-pct');
      sheet.style.transform = `scale(${zoom})`;
      sheet.style.transformOrigin = 'top left';
      pct.textContent = Math.round(zoom * 100) + '%';
    }

    function zoomIn() {
      zoom = Math.min(ZOOM_MAX, Math.round((zoom + ZOOM_STEP) * 100) / 100);
      applyZoom();
    }

    function zoomOut() {
      zoom = Math.max(ZOOM_MIN, Math.round((zoom - ZOOM_STEP) * 100) / 100);
      applyZoom();
    }

    function zoomFit() {
      const sheet = document.getElementById('sheet');
      const container = document.getElementById('canvas-container');
      const cw = container.clientWidth - 40;
      const ch = container.clientHeight - 40;
      const sw = sheet.offsetWidth || (window.CONFIG.sheetW * MM_TO_PX);
      const sh = sheet.offsetHeight || (window.CONFIG.sheetH * MM_TO_PX);
      zoom = Math.min(1, Math.min(cw / sw, ch / sh));
      zoom = Math.round(zoom * 100) / 100;
      applyZoom();
    }

    function setupControls() {
      document.querySelectorAll('.control-group input[type="range"]').forEach(slider => {
        const display = slider.closest('.control-group').querySelector('span[id^="val-"]');
        if (display) {
          slider.addEventListener('input', () => {
            display.textContent = slider.value;
            scheduleRegenerate();
          });
        }
      });

      document.querySelectorAll('#sidebar-content input, #sidebar-content select').forEach(input => {
        if (input.type !== 'range' && input.id !== 'sidebar-sheet-w' && input.id !== 'sidebar-sheet-h') {
          input.addEventListener('change', scheduleRegenerate);
        }
      });

      document.getElementById('sidebar-sheet-w').addEventListener('change', () => {
        const w = parseInt(document.getElementById('sidebar-sheet-w').value, 10);
        const h = parseInt(document.getElementById('sidebar-sheet-h').value, 10);
        if (w >= 10 && h >= 10) applySheetSize(w, h);
      });
      document.getElementById('sidebar-sheet-h').addEventListener('change', () => {
        const w = parseInt(document.getElementById('sidebar-sheet-w').value, 10);
        const h = parseInt(document.getElementById('sidebar-sheet-h').value, 10);
        if (w >= 10 && h >= 10) applySheetSize(w, h);
      });

      document.getElementById('btn-new-seed').addEventListener('click', () => {
        document.getElementById('input-seed').value = Math.floor(Math.random() * 99999);
        scheduleRegenerate();
      });

      document.getElementById('btn-regenerate').addEventListener('click', () => {
        document.getElementById('input-seed').value = Math.floor(Math.random() * 99999);
        generateComposition();
      });

      function exportDone(type) {
        const status = document.getElementById('export-status');
        status.textContent = '✓ Scaricato';
        document.querySelectorAll('.btn-export').forEach(b => b.classList.remove('done'));
        const btn = document.querySelector(`[data-export="${type}"]`);
        if (btn) btn.classList.add('done');
        setTimeout(() => { status.textContent = ''; }, 2500);
      }

      document.getElementById('btn-export-svg').addEventListener('click', () => { exportSVG(); exportDone('svg'); });
      document.getElementById('btn-export-png').addEventListener('click', () => { exportPNG(); exportDone('png'); });
      document.getElementById('btn-export-pdf').addEventListener('click', () => { window.print(); exportDone('pdf'); });

      document.getElementById('zoom-in').addEventListener('click', zoomIn);
      document.getElementById('zoom-out').addEventListener('click', zoomOut);
      document.getElementById('zoom-fit').addEventListener('click', zoomFit);
    }

    let regenerateTimeout = null;

    function scheduleRegenerate() {
      if (regenerateTimeout) cancelAnimationFrame(regenerateTimeout);
      regenerateTimeout = requestAnimationFrame(() => {
        generateComposition();
        regenerateTimeout = null;
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupControls();

      document.getElementById('sidebar-toggle').addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('open');
      });
      document.getElementById('sidebar-close').addEventListener('click', () => {
        document.getElementById('sidebar').classList.remove('open');
      });
    });
  </script>
</body>
</html>
